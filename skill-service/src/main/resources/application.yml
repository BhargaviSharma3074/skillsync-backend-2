spring:
  application:
    name: skill-service
  config:
    import: optional:configserver:http://localhost:8888

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: 6379

  cache:
    type: redis
    redis:
      time-to-live: 1800000   # 30 minutes — skills rarely change