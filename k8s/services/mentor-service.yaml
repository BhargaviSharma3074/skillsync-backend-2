apiVersion: apps/v1
kind: Deployment
metadata:
  name: mentor-service
  namespace: skillsync
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: mentor-service
  template:
    metadata:
      labels:
        app: mentor-service
    spec:
      containers:
        - name: mentor-service
          image: AWS_ACCOUNT_ID_PLACEHOLDER.dkr.ecr.REGION_PLACEHOLDER.amazonaws.com/skillsync-repo/mentor-service:latest
          ports:
            - containerPort: 8083
          envFrom:
            - configMapRef:
                name: skillsync-config
          env:
            - name: SPRING_APPLICATION_NAME
              value: "mentor-service"
            - name: JAVA_TOOL_OPTIONS
              value: "-Xms64m -Xmx192m"
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:mysql://mysql:3306/mentor_service"
            - name: SPRING_DATASOURCE_USERNAME
              value: "root"
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: skillsync-secrets
                  key: MYSQL_ROOT_PASSWORD
            - name: JAVA_OPTS
              value: "-Xms128m -Xmx384m"
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8083
            initialDelaySeconds: 120
            periodSeconds: 10
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8083
            initialDelaySeconds: 300
            periodSeconds: 15

---
apiVersion: v1
kind: Service
metadata:
  name: mentor-service
  namespace: skillsync
spec:
  selector:
    app: mentor-service
  ports:
    - port: 8083
      targetPort: 8083
  type: ClusterIP
