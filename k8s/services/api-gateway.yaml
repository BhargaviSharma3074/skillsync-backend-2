apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: skillsync
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: AWS_ACCOUNT_ID_PLACEHOLDER.dkr.ecr.REGION_PLACEHOLDER.amazonaws.com/skillsync-repo/api-gateway:latest
          ports:
            - containerPort: 9090
          envFrom:
            - configMapRef:
                name: skillsync-config
          env:
            - name: SPRING_APPLICATION_NAME
              value: "api-gateway"
            - name: JAVA_TOOL_OPTIONS
              value: "-Xms64m -Xmx256m"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: skillsync-secrets
                  key: JWT_SECRET
            - name: JAVA_OPTS
              value: "-Xms128m -Xmx384m"
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 9090
            initialDelaySeconds: 120
            periodSeconds: 10
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 9090
            initialDelaySeconds: 240
            periodSeconds: 15
            failureThreshold: 5

---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: skillsync
spec:
  selector:
    app: api-gateway
  ports:
    - port: 80
      targetPort: 9090
  type: ClusterIP    # traffic comes through nginx ingress
