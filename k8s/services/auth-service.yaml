apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: skillsync
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: AWS_ACCOUNT_ID_PLACEHOLDER.dkr.ecr.REGION_PLACEHOLDER.amazonaws.com/skillsync-repo/auth-service:latest
          ports:
            - containerPort: 8081
          envFrom:
            - configMapRef:
                name: skillsync-config
          env:
            - name: SPRING_APPLICATION_NAME
              value: "auth-service"
            - name: JAVA_TOOL_OPTIONS
              value: "-Xms64m -Xmx256m"
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:mysql://mysql:3306/skillsync_auth"
            - name: SPRING_DATASOURCE_USERNAME
              value: "root"
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: skillsync-secrets
                  key: MYSQL_ROOT_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: skillsync-secrets
                  key: JWT_SECRET
            - name: SMTP_USERNAME
              valueFrom:
                secretKeyRef:
                  name: skillsync-secrets
                  key: SMTP_USERNAME
            - name: SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: skillsync-secrets
                  key: SMTP_PASSWORD
            - name: FRONTEND_URL
              value: "http://localhost:4200"
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: skillsync-secrets
                  key: GOOGLE_CLIENT_ID
            - name: JAVA_OPTS
              value: "-Xms128m -Xmx384m"
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 120
            periodSeconds: 10
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 240
            periodSeconds: 15
            failureThreshold: 5

---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: skillsync
spec:
  selector:
    app: auth-service
  ports:
    - port: 8081
      targetPort: 8081
  type: ClusterIP
