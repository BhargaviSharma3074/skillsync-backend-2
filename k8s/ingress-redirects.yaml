apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: skillsync-redirects
  namespace: skillsync
  annotations: {}
spec:
  ingressClassName: nginx
  rules:
    - host: skillsync.mooo.com
      http:
        paths:
          - path: /eureka
            pathType: Exact
            backend:
              service:
                name: eureka-server
                port:
                  number: 8761
          - path: /rabbitmq
            pathType: Exact
            backend:
              service:
                name: rabbitmq
                port:
                  number: 15672
          - path: /zipkin
            pathType: Exact
            backend:
              service:
                name: zipkin
                port:
                  number: 9411
          - path: /grafana
            pathType: Exact
            backend:
              service:
                name: grafana
                port:
                  number: 3000
          - path: /prometheus
            pathType: Exact
            backend:
              service:
                name: prometheus
                port:
                  number: 9090
          - path: /sonarqube
            pathType: Exact
            backend:
              service:
                name: sonarqube
                port:
                  number: 9000
