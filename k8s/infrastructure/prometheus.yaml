apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-alerts
  namespace: skillsync
data:
  alerts.yml: |
    groups:
      - name: skillsync.disk
        rules:
          - alert: PVCAlmostFull
            expr: |
              kubelet_volume_stats_used_bytes / kubelet_volume_stats_capacity_bytes > 0.80
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "PVC {{ $labels.persistentvolumeclaim }} is over 80% full"
              description: "{{ $value | humanizePercentage }} used on PVC {{ $labels.persistentvolumeclaim }} in namespace {{ $labels.namespace }}"

          - alert: PVCCritical
            expr: |
              kubelet_volume_stats_used_bytes / kubelet_volume_stats_capacity_bytes > 0.95
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "PVC {{ $labels.persistentvolumeclaim }} is over 95% full — immediate action required"
              description: "{{ $value | humanizePercentage }} used on PVC {{ $labels.persistentvolumeclaim }}"

      - name: skillsync.pods
        rules:
          - alert: PodCrashLooping
            expr: |
              increase(kube_pod_container_status_restarts_total{namespace="skillsync"}[1h]) > 5
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Pod {{ $labels.pod }} is crash looping"
              description: "Container {{ $labels.container }} in pod {{ $labels.pod }} has restarted {{ $value | humanize }} times in the last hour"

          - alert: ServiceDown
            expr: up{job=~"auth-service|api-gateway|user-service|notification-service|payment-service"} == 0
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "Service {{ $labels.job }} is down"
              description: "{{ $labels.job }} has been unreachable for more than 2 minutes"

      - name: skillsync.jvm
        rules:
          - alert: JvmHeapHighUsage
            expr: |
              jvm_memory_used_bytes{area="heap"} / jvm_memory_max_bytes{area="heap"} > 0.85
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "High JVM heap usage on {{ $labels.job }}"
              description: "{{ $labels.job }} heap is at {{ $value | humanizePercentage }} — OOM risk"

      - name: skillsync.rabbitmq
        rules:
          - alert: RabbitMQQueueBacklog
            expr: |
              rabbitmq_queue_messages{queue=~"notification.*"} > 10000
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "RabbitMQ queue {{ $labels.queue }} has a large backlog"
              description: "{{ $labels.queue }} has {{ $value | humanize }} messages — possible consumer loop or outage"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: skillsync
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    rule_files:
      - /etc/prometheus/alerts.yml

    scrape_configs:
      - job_name: 'kubernetes-kubelet'
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          insecure_skip_verify: true
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)
          - target_label: __address__
            replacement: kubernetes.default.svc:443
          - source_labels: [__meta_kubernetes_node_name]
            regex: (.+)
            target_label: __metrics_path__
            replacement: /api/v1/nodes/${1}/proxy/metrics/cadvisor

      - job_name: 'kube-state-metrics'
        static_configs:
          - targets: ['kube-state-metrics.kube-system.svc.cluster.local:8080']

      - job_name: 'rabbitmq'
        static_configs:
          - targets: ['rabbitmq:15692']

      - job_name: 'config-server'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['config-server:8888']

      - job_name: 'eureka-server'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['eureka-server:8761']

      - job_name: 'api-gateway'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['api-gateway:9090']

      - job_name: 'auth-service'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['auth-service:8081']

      - job_name: 'user-service'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['user-service:8082']

      - job_name: 'mentor-service'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['mentor-service:8083']

      - job_name: 'skill-service'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['skill-service:8084']

      - job_name: 'session-service'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['session-service:8085']

      - job_name: 'group-service'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['group-service:8086']

      - job_name: 'review-service'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['review-service:8087']

      - job_name: 'notification-service'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['notification-service:8088']

      - job_name: 'payment-service'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['payment-service:8089']

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: skillsync
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      serviceAccountName: prometheus
      containers:
        - name: prometheus
          image: prom/prometheus:v3.10.0
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"
            - "--web.external-url=/prometheus"
            - "--web.route-prefix=/prometheus"
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus/prometheus.yml
              subPath: prometheus.yml
            - name: alerts
              mountPath: /etc/prometheus/alerts.yml
              subPath: alerts.yml
            - name: data
              mountPath: /prometheus
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "300m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /prometheus/-/ready
              port: 9090
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: alerts
          configMap:
            name: prometheus-alerts
        - name: data
          emptyDir: {}

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: skillsync

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus
rules:
  - apiGroups: [""]
    resources: [nodes, nodes/proxy, nodes/metrics, services, endpoints, pods]
    verbs: [get, list, watch]
  - nonResourceURLs: [/metrics, /metrics/cadvisor]
    verbs: [get]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: prometheus
subjects:
  - kind: ServiceAccount
    name: prometheus
    namespace: skillsync

---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: skillsync
spec:
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090
  type: ClusterIP
