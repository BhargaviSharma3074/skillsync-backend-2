apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: skillsync-ingress
  namespace: skillsync
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - skillsync.mooo.com
      secretName: skillsync-tls
  rules:
    - host: skillsync.mooo.com
      http:
        paths:
          # API Gateway — all app traffic
          - path: /api(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: api-gateway
                port:
                  number: 9090

          # Eureka dashboard
          - path: /eureka(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: eureka-server
                port:
                  number: 8761

          # RabbitMQ management UI
          - path: /rabbitmq(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: rabbitmq
                port:
                  number: 15672
