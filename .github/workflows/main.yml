name: Backend CI/CD Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - api-gateway
          - auth-service
          - user-service
          - session-service
          - payment-service
          - notification-service
          - mentor-service
          - review-service
          - skill-service
          - group-service
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Build & Test
        run: mvn clean verify
        working-directory: ./${{ matrix.service }}

      - name: Upload Test Reports
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.service }}-reports
          path: ./${{ matrix.service }}/target/surefire-reports/

