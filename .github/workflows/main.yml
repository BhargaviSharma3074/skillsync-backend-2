name: Backend CI/CD Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - api-gateway
          - auth-service
          - user-service
          - session-service
          - payment-service
          - notification-service
          - mentor-service
          - review-service
          - skill-service
          - group-service
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Build & Test
        run: mvn clean verify
        working-directory: ./${{ matrix.service }}

      - name: Upload Test Reports
        uses: actions/upload-artifact@v3
        with:
          name: ${{ matrix.service }}-reports
          path: ./${{ matrix.service }}/target/surefire-reports/

  sonar:
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0  
          
      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - name: Sonar Scan
  
        run: mvn sonar:sonar -Dsonar.projectKey=your_project_key
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
