name: Backend CI/CD Pipeline

on:
push:
branches: [ "main" ]
pull_request:
branches: [ "main" ]

jobs:

build-test:
runs-on: ubuntu-latest


strategy:
  matrix:
    service:
      - api-gateway
      - auth-service
      - user-service
      - session-service
      - payment-service
      - notification-service
      - mentor-service
      - review-service
      - skill-service
      - group-service

steps:
- name: Checkout code
  uses: actions/checkout@v3

- name: Set up Java
  uses: actions/setup-java@v3
  with:
    distribution: 'temurin'
    java-version: '17'

- name: Build & Test
  run: mvn clean verify
  working-directory: ./${{ matrix.service }}

- name: Upload Test Reports
  uses: actions/upload-artifact@v3
  with:
    name: ${{ matrix.service }}-reports
    path: ${{ matrix.service }}/target


sonar:
runs-on: ubuntu-latest
needs: build-test


steps:
- uses: actions/checkout@v3

- name: Set up Java
  uses: actions/setup-java@v3
  with:
    distribution: 'temurin'
    java-version: '17'

- name: Sonar Scan
  run: mvn sonar:sonar \
    -Dsonar.projectKey=YOUR_PROJECT_KEY \
    -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
    -Dsonar.login=${{ secrets.SONAR_TOKEN }}


docker-build-push:
runs-on: ubuntu-latest
needs: sonar


strategy:
  matrix:
    service:
      - api-gateway
      - auth-service
      - user-service
      - session-service
      - payment-service
      - notification-service
      - mentor-service
      - review-service
      - skill-service
      - group-service

steps:
- name: Checkout
  uses: actions/checkout@v3

- name: Login to Docker Hub
  uses: docker/login-action@v2
  with:
    username: ${{ secrets.DOCKER_USERNAME }}
    password: ${{ secrets.DOCKER_PASSWORD }}

- name: Build & Push Docker Image
  run: |
    docker build -t ${{ secrets.DOCKER_USERNAME }}/${{ matrix.service }}:latest ./${{ matrix.service }}
    docker push ${{ secrets.DOCKER_USERNAME }}/${{ matrix.service }}:latest


deploy:
runs-on: ubuntu-latest
needs: docker-build-push


steps:
- name: Authenticate to :contentReference[oaicite:1]{index=1}
  uses: google-github-actions/auth@v1
  with:
    credentials_json: ${{ secrets.GCP_CREDENTIALS }}

- name: Set up gcloud
  uses: google-github-actions/setup-gcloud@v1

- name: Deploy services to :contentReference[oaicite:2]{index=2}
  run: |
    for service in api-gateway auth-service user-service session-service payment-service notification-service mentor-service review-service skill-service group-service
    do
      gcloud run deploy $service \
        --image docker.io/${{ secrets.DOCKER_USERNAME }}/$service:latest \
        --region asia-south1 \
        --platform managed \
        --allow-unauthenticated
    done

